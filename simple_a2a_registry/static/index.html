<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2A Registry Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0d1117; color: #c9d1d9; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 24px; font-weight: 600; }
  h1 small { font-size: 14px; font-weight: 400; color: #8b949e; }
  .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
  .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .value { font-size: 28px; font-weight: 700; line-height: 1.2; }
  .stat-card.total     .value { color: #f0f6fc; }
  .stat-card.alive     .value { color: #3fb950; }
  .stat-card.stale     .value { color: #d29922; }
  .stat-card.tasks     .value { color: #58a6ff; }
  .stat-card.v2-todo   .value { color: #8b949e; }
  .stat-card.v2-ready  .value { color: #58a6ff; }
  .stat-card.v2-run    .value { color: #d2a8ff; }
  .stat-card.v2-block  .value { color: #f0883e; }
  .stat-card.v2-done   .value { color: #3fb950; }
  .stat-card.v2-fail   .value { color: #f85149; }
  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid #30363d; }
  .tabs button { background: transparent; border: none; color: #8b949e; padding: 10px 20px; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tabs button:hover { color: #c9d1d9; }
  .tabs button.active { color: #f0f6fc; border-bottom-color: #f0f6fc; }
  .tab-content { display: none; margin-top: 16px; }
  .tab-content.active { display: block; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 14px; }
  .filter-bar input { flex: 1; min-width: 200px; }
  .filter-bar input::placeholder { color: #484f58; }
  .filter-bar select { min-width: 120px; }
  .filter-bar button { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 8px 16px; color: #c9d1d9; cursor: pointer; }
  .filter-bar button:hover { background: #30363d; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #21262d; }
  td { padding: 12px; border-bottom: 1px solid #21262d; font-size: 14px; }
  .tag { display: inline-block; background: #1f6feb33; color: #58a6ff; border-radius: 12px; padding: 2px 8px; font-size: 12px; margin: 1px; }
  .badge { display: inline-block; border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: 500; }
  .badge-alive { background: #3fb95022; color: #3fb950; }
  .badge-stale { background: #d2992222; color: #d29922; }
  .badge-dispatched  { background: #58a6ff22; color: #58a6ff; }
  .badge-forwarded   { background: #d2992222; color: #d29922; }
  .badge-working     { background: #3fb95022; color: #3fb950; }
  .badge-completed   { background: #3fb95033; color: #3fb950; }
  .badge-failed      { background: #f8514922; color: #f85149; }
  .badge-ws { display: inline-block; background: #3fb95033; color: #3fb950; border: 1px solid #3fb95044; border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 600; margin-left: 4px; vertical-align: middle; letter-spacing: 0.3px; }
  .skill-row { border-bottom: 1px solid #161b22; }
  .agent-row, .task-row, .kb-row { cursor: default; }
  .agent-row:hover, .task-row:hover, .kb-row:hover { background: #161b22; }
  .agent-details, .task-details, .kb-details { display: none; }
  .agent-details.open, .task-details.open, .kb-details.open { display: table-row; }
  .agent-details td, .task-details td, .kb-details td { background: #0d1117; padding: 16px 24px; }
  .detail-section { margin-bottom: 12px; }
  .detail-section h3 { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 6px; }
  .skill-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; }
  .skill-card .name { font-weight: 500; }
  .skill-card .desc { font-size: 12px; color: #8b949e; }
  .task-query { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; font-family: monospace; font-size: 13px; margin-bottom: 8px; }
  .task-result pre { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; font-size: 13px; overflow-x: auto; max-height: 200px; }
  .loading { text-align: center; padding: 48px; color: #8b949e; }
  .error { text-align: center; padding: 48px; color: #f85149; }
  code { font-size: 12px; color: #8b949e; word-break: break-all; }

  /* Kanban-specific styles */
  .badge-todo      { background: #8b949e22; color: #8b949e; }
  .badge-ready     { background: #58a6ff22; color: #58a6ff; }
  .badge-running   { background: #d2a8ff22; color: #d2a8ff; }
  .badge-blocked   { background: #f0883e22; color: #f0883e; }
  .badge-archived  { background: #30363d55; color: #484f58; }
  .badge-cancelled { background: #f8514922; color: #f85149; }

  .kb-board { display: flex; gap: 12px; overflow-x: auto; min-height: 400px; padding-bottom: 16px; }
  .kb-column { background: #161b22; border: 1px solid #30363d; border-radius: 8px; min-width: 220px; flex: 1; max-width: 300px; }
  .kb-col-header { padding: 10px 14px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #30363d; color: #8b949e; }
  .kb-col-header .count { float: right; color: #484f58; font-size: 12px; }
  .kb-col-body { padding: 8px; min-height: 60px; }
  .kb-card { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
  .kb-card:hover { border-color: #30363d; }
  .kb-card-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
  .kb-card-meta { font-size: 11px; color: #484f58; display: flex; gap: 8px; flex-wrap: wrap; }
  .kb-card-meta span { display: inline-flex; align-items: center; gap: 3px; }
  .kb-card .badge { font-size: 10px; margin-right: 4px; }
  .kb-col-todo    .kb-col-header { border-bottom-color: #8b949e; }
  .kb-col-ready   .kb-col-header { border-bottom-color: #58a6ff; }
  .kb-col-running .kb-col-header { border-bottom-color: #d2a8ff; }
  .kb-col-blocked .kb-col-header { border-bottom-color: #f0883e; }
  .kb-col-completed .kb-col-header { border-bottom-color: #3fb950; }
  .kb-col-failed  .kb-col-header { border-bottom-color: #f85149; }
  .kb-col-archived .kb-col-header { border-bottom-color: #30363d; }
  .kb-col-cancelled .kb-col-header { border-bottom-color: #f85149; }

  .detail-tabs { display: flex; gap: 0; border-bottom: 1px solid #21262d; margin-bottom: 8px; }
  .detail-tabs button { background: transparent; border: none; color: #8b949e; padding: 6px 14px; cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .detail-tabs button:hover { color: #c9d1d9; }
  .detail-tabs button.active { color: #f0f6fc; border-bottom-color: #58a6ff; }
  .detail-pane { display: none; }
  .detail-pane.active { display: block; }

  .dep-graph { margin: 8px 0; padding: 8px; background: #161b22; border-radius: 6px; font-size: 12px; }
  .dep-node { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 4px; background: #21262d; }
  .dep-arrow { color: #484f58; margin: 0 4px; }

  .comment-bubble { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; }
  .comment-bubble .author { font-weight: 500; font-size: 12px; color: #58a6ff; }
  .comment-bubble .time { font-size: 11px; color: #484f58; margin-left: 8px; }
  .comment-bubble .body { font-size: 13px; margin-top: 4px; }

  .event-item { padding: 4px 8px; font-size: 12px; border-left: 2px solid #21262d; margin: 2px 0; }
  .event-item .kind { font-weight: 500; color: #58a6ff; }

  .run-item { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; }
  .run-item .run-status { font-weight: 500; }
  .run-item .run-outcome { color: #8b949e; }

  /* Login overlay */
  #login-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0d1117; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  #login-overlay.hidden { display: none !important; }
  .login-modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 40px; width: 420px; max-width: 90vw;
  }
  .login-modal h2 {
    font-size: 22px; font-weight: 600; color: #f0f6fc; margin-bottom: 6px;
  }
  .login-modal .subtitle {
    font-size: 13px; color: #8b949e; margin-bottom: 28px;
  }
  .login-modal label {
    display: block; font-size: 12px; color: #8b949e;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .login-modal input {
    width: 100%; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; padding: 10px 14px; color: #c9d1d9;
    font-size: 14px; margin-bottom: 16px; outline: none;
  }
  .login-modal input:focus { border-color: #58a6ff; }
  .login-modal .login-btn {
    width: 100%; background: #238636; border: none; border-radius: 6px;
    padding: 10px; color: #fff; font-size: 15px; font-weight: 500;
    cursor: pointer; margin-top: 4px;
  }
  .login-modal .login-btn:hover { background: #2ea043; }
  .login-modal .login-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .login-modal .login-error {
    color: #f85149; font-size: 13px; margin-top: 12px; display: none;
  }
  .login-modal .login-error.show { display: block; }

  /* Logout button in header */
  .header-right { display: flex; align-items: center; gap: 12px; }
  .auth-badge {
    font-size: 11px; color: #8b949e; padding: 4px 10px;
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
  }
  .logout-btn {
    background: transparent; border: 1px solid #30363d; border-radius: 6px;
    padding: 6px 14px; color: #8b949e; font-size: 13px; cursor: pointer;
  }
  .logout-btn:hover { background: #21262d; color: #f85149; border-color: #f85149; }
</style>
</head>
<body>
<div id="login-overlay">
  <div class="login-modal">
    <h2>A2A Registry</h2>
    <div class="subtitle">Authentication required — enter your OAuth credentials</div>
    <form id="login-form" onsubmit="doLogin(event)">
      <label for="login-cid">Client ID</label>
      <input id="login-cid" type="text" placeholder="e.g. client-a1b2c3d4e5f6" required>
      <label for="login-secret">Client Secret</label>
      <input id="login-secret" type="password" placeholder="your client secret" required>
      <button type="submit" class="login-btn" id="login-btn">Login</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>
<div class="container" id="dashboard">
  <div class="header-bar">
    <h1>A2A Registry <small>Agent-to-Agent + Orchestration Dashboard</small></h1>
    <div class="header-right" id="header-right"></div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <button id="tab-agents" class="active" onclick="switchTab('agents')">Agents</button>
    <button id="tab-tasks" onclick="switchTab('tasks')">Tasks</button>
    <button id="tab-kanban" onclick="switchTab('kanban')">Kanban</button>
    <button id="tab-admin" onclick="switchTab('admin')">Admin</button>
  </div>

  <!-- Agents tab -->
  <div id="content-agents" class="tab-content active">
    <div class="filter-bar">
      <input type="text" id="search" placeholder="Search agents..." oninput="debouncedSearch()">
      <button onclick="fetchAgents()">Refresh</button>
    </div>
    <div id="agent-list"><div class="loading">Loading agents...</div></div>
  </div>

  <!-- Tasks tab -->
  <div id="content-tasks" class="tab-content">
    <div class="filter-bar">
      <input type="text" id="task-search" placeholder="Filter by agent ID..." oninput="debouncedTaskSearch()">
      <select id="task-state-filter" onchange="fetchTasks()">
        <option value="">All States</option>
        <option value="dispatched">dispatched</option>
        <option value="forwarded">forwarded</option>
        <option value="working">working</option>
        <option value="completed">completed</option>
        <option value="failed">failed</option>
      </select>
      <button onclick="fetchTasks()">Refresh</button>
    </div>
    <div id="task-list"><div class="loading">No tasks yet.</div></div>
  </div>

  <!-- Kanban tab -->
  <div id="content-kanban" class="tab-content">
    <div class="filter-bar">
      <input type="text" id="kb-search" placeholder="Search title / body..." oninput="debouncedKanbanSearch()">
      <select id="kb-status-filter" onchange="fetchKanban()">
        <option value="">All Statuses</option>
        <option value="todo">todo</option>
        <option value="ready">ready</option>
        <option value="running">running</option>
        <option value="blocked">blocked</option>
        <option value="completed">completed</option>
        <option value="failed">failed</option>
        <option value="cancelled">cancelled</option>
        <option value="archived">archived</option>
      </select>
      <select id="kb-assignee-filter" onchange="fetchKanban()">
        <option value="">All Assignees</option>
      </select>
      <button onclick="fetchKanban()">Refresh</button>
      <button onclick="switchKanbanView('board')" id="view-board" style="background:#1f6feb33;border-color:#1f6feb55;">Board</button>
      <button onclick="switchKanbanView('list')" id="view-list">List</button>
      <button onclick="showCreateTaskModal()" style="background:#238636;border-color:#238636;color:#fff;">+ 创建任务</button>
    </div>
    <div id="kanban-board"><div class="loading">Loading orchestration tasks...</div></div>
  </div>

  <!-- Admin tab -->
  <div id="content-admin" class="tab-content">
    <div class="filter-bar">
      <input type="text" id="admin-search" placeholder="Filter by client_id or agent_card_id..." oninput="debouncedAdminSearch()">
      <button onclick="fetchAdminClients()">Refresh</button>
    </div>
    <div id="admin-clients"><div class="loading">Loading OAuth clients...</div></div>
    <div id="admin-create-section" style="margin-top:24px;">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:12px;color:#c9d1d9;">Create OAuth Client</h3>
      <div id="admin-create-form" style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;">
        <div style="display:flex;gap:12px;margin-bottom:12px;">
          <div style="flex:1;">
            <label style="display:block;font-size:12px;color:#8b949e;margin-bottom:4px;">Agent Card ID</label>
            <input id="ac-agent-card-id" type="text" placeholder="e.g. my-agent" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:14px;">
          </div>
          <div style="flex:2;">
            <label style="display:block;font-size:12px;color:#8b949e;margin-bottom:4px;">Description</label>
            <input id="ac-description" type="text" placeholder="A short description of this client" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:14px;">
          </div>
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:12px;color:#8b949e;margin-bottom:8px;">Allowed Scopes</label>
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9;cursor:pointer;">
              <input type="checkbox" class="ac-scope" value="task:read" checked> task:read
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9;cursor:pointer;">
              <input type="checkbox" class="ac-scope" value="task:write"> task:write
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9;cursor:pointer;">
              <input type="checkbox" class="ac-scope" value="agent:read"> agent:read
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9;cursor:pointer;">
              <input type="checkbox" class="ac-scope" value="agent:register"> agent:register
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#c9d1d9;cursor:pointer;">
              <input type="checkbox" class="ac-scope" value="registry:admin"> registry:admin
            </label>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="createAdminClient()" style="background:#238636;border:1px solid #2ea043;border-radius:6px;padding:8px 20px;color:#fff;cursor:pointer;font-weight:500;">Create Client</button>
          <div id="ac-status" style="display:flex;align-items:center;font-size:13px;color:#8b949e;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = "";
let searchTimeout = null;
let taskSearchTimeout = null;
let kbSearchTimeout = null;
let adminSearchTimeout = null;
let kanbanView = "board";
const STATUS_COLUMNS = ["todo","ready","running","blocked","completed","failed","cancelled","archived"];
const STATUS_LABELS = {todo:"Todo",ready:"Ready",running:"Running",blocked:"Blocked",completed:"Completed",failed:"Failed",cancelled:"Cancelled",archived:"Archived"};

// ── Auth ──────────────────────────────────────────────────────────

function getAuthToken() {
  return sessionStorage.getItem("a2a_dash_token");
}

function isAuthEnabled() {
  return window.__AUTH_CONFIG && window.__AUTH_CONFIG.enabled === true;
}

function isAuthenticated() {
  return !isAuthEnabled() || !!getAuthToken();
}

function authHeaders() {
  const token = getAuthToken();
  if (token) {
    return { "Authorization": `Bearer ${token}` };
  }
  return {};
}

function doLogin(event) {
  event.preventDefault();
  const btn = document.getElementById("login-btn");
  const errorEl = document.getElementById("login-error");
  const cid = document.getElementById("login-cid").value.trim();
  const secret = document.getElementById("login-secret").value.trim();
  btn.disabled = true;
  btn.textContent = "Authenticating...";
  errorEl.classList.remove("show");
  errorEl.textContent = "";
  fetch(`${API}/auth/token`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `grant_type=client_credentials&client_id=${encodeURIComponent(cid)}&client_secret=${encodeURIComponent(secret)}`
  })
  .then(r => {
    if (!r.ok) { throw new Error(`Login failed (HTTP ${r.status})`); }
    return r.json();
  })
  .then(data => {
    sessionStorage.setItem("a2a_dash_token", data.access_token);
    document.getElementById("login-overlay").classList.add("hidden");
    updateHeaderStatus();
    initDashboard();
  })
  .catch(err => {
    errorEl.textContent = err.message;
    errorEl.classList.add("show");
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = "Login";
  });
}

function doLogout() {
  sessionStorage.removeItem("a2a_dash_token");
  document.getElementById("login-overlay").classList.remove("hidden");
  updateHeaderStatus();
}

function updateHeaderStatus() {
  const el = document.getElementById("header-right");
  if (isAuthEnabled()) {
    if (isAuthenticated()) {
      el.innerHTML = '<span class="auth-badge">🔐 Authenticated</span><button class="logout-btn" onclick="doLogout()">Logout</button>';
    } else {
      el.innerHTML = '<span class="auth-badge" style="color:#d29922;">🔒 Auth Required</span>';
    }
  } else {
    el.innerHTML = '<span class="auth-badge" style="color:#8b949e;">🔓 Auth Disabled</span>';
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────

function initDashboard() {
  updateHeaderStatus();
  fetchAgents();
  updateStats();
}

// On page load: check auth, show login overlay if needed
(function() {
  if (isAuthEnabled() && !isAuthenticated()) {
    document.getElementById("login-overlay").classList.remove("hidden");
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("login-overlay").classList.add("hidden");
  }
  updateHeaderStatus();
  if (isAuthenticated()) {
    initDashboard();
  }
})();

// ── Data fetching ─────────────────────────────────────────────────

function debouncedSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(fetchAgents, 300); }
function debouncedTaskSearch() { clearTimeout(taskSearchTimeout); taskSearchTimeout = setTimeout(fetchTasks, 300); }
function debouncedKanbanSearch() { clearTimeout(kbSearchTimeout); kbSearchTimeout = setTimeout(fetchKanban, 300); }
function debouncedAdminSearch() { clearTimeout(adminSearchTimeout); adminSearchTimeout = setTimeout(fetchAdminClients, 300); }

async function fetchData(url) {
  const resp = await fetch(url, { headers: authHeaders() });
  if (resp.status === 401) {
    sessionStorage.removeItem("a2a_dash_token");
    document.getElementById("login-overlay").classList.remove("hidden");
    document.getElementById("login-error").textContent = "Session expired — please login again.";
    document.getElementById("login-error").classList.add("show");
    throw new Error("Unauthorized");
  }
  if (!resp.ok) throw new Error(resp.statusText);
  return resp.json();
}

// ── Stats ─────────────────────────────────────────────────────────

async function updateStats() {
  try {
    const [health, kbStats] = await Promise.all([
      fetchData(`${API}/health`).catch(() => null),
      fetchData(`${API}/v2/stats`).catch(() => null)
    ]);
    const s = document.getElementById("stats");
    if (!health && !kbStats) { s.innerHTML = ""; return; }
    let html = "";
    if (health) {
      const st = health.stats || {};
      html +=
        `<div class="stat-card total"><div class="stat-label">Agents</div><div class="value">${st.total_agents || 0}</div></div>` +
        `<div class="stat-card alive"><div class="stat-label">Alive</div><div class="value">${st.alive_agents || 0}</div></div>` +
        `<div class="stat-card stale"><div class="stat-label">Stale</div><div class="value">${st.stale_agents || 0}</div></div>` +
        `<div class="stat-card tasks"><div class="stat-label">WS</div><div class="value">${st.connected_via_ws || 0}</div></div>`;
    }
    if (kbStats) {
      html +=
        `<div class="stat-card v2-todo"><div class="stat-label">Todo</div><div class="value">${kbStats.todo||0}</div></div>` +
        `<div class="stat-card v2-ready"><div class="stat-label">Ready</div><div class="value">${kbStats.ready||0}</div></div>` +
        `<div class="stat-card v2-run"><div class="stat-label">Running</div><div class="value">${kbStats.running||0}</div></div>` +
        `<div class="stat-card v2-block"><div class="stat-label">Blocked</div><div class="value">${kbStats.blocked||0}</div></div>` +
        `<div class="stat-card v2-done"><div class="stat-label">Done</div><div class="value">${kbStats.completed||0}</div></div>` +
        `<div class="stat-card v2-fail"><div class="stat-label">Failed</div><div class="value">${kbStats.failed||0}</div></div>`;
    }
    s.innerHTML = html;
  } catch (e) { /* ignore */ }
}

// ── AGENTS ────────────────────────────────────────────────────────

async function fetchAgents() {
  const container = document.getElementById("agent-list");
  container.innerHTML = '<div class="loading">Loading agents...</div>';
  try {
    const q = document.getElementById("search").value.trim();
    const url = q ? `${API}/v1/agents?q=${encodeURIComponent(q)}` : `${API}/v1/agents`;
    const data = await fetchData(url);
    renderAgents(data);
    updateStats();
  } catch (e) {
    container.innerHTML = `<div class="error">Failed to load agents: ${e.message}</div>`;
  }
}

function toggleAgentDetails(id) {
  const row = document.getElementById(`agent-details-${id}`);
  if (row) row.classList.toggle("open");
}

function renderAgents(data) {
  const container = document.getElementById("agent-list");
  if (!data.agents || data.agents.length === 0) {
    container.innerHTML = '<div class="loading">No agents registered yet.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Status</th><th>Name</th><th>Skills</th><th>Tags</th><th>Last Heartbeat</th></tr></thead><tbody>';
  for (const agent of data.agents) {
    const statusClass = agent.status === "alive" ? "badge-alive" : "badge-stale";
    const skills = (agent.skills || agent.capabilities?.skills || []).slice(0, 3);
    const skillNames = skills.map(s => s.name).join(", ") || "-";
    const tags = (agent.tags || []).map(t => `<span class="tag">${t}</span>`).join("") || "-";
    const hb = agent.lastHeartbeat ? new Date(agent.lastHeartbeat * 1000).toLocaleString() : "-";
    const id = agent.id;
    const safeId = id.replace(/[^a-zA-Z0-9_-]/g, "_");
    html += `<tr class="agent-row" onclick="toggleAgentDetails('${safeId}')">`;
    html += `<td><span class="badge ${statusClass}">${agent.status}</span>${agent.connection === 'websocket' ? '<span class="badge-ws">WS</span>' : ''}</td>`;
    html += `<td><strong>${escHtml(agent.name)}</strong><br><small style="color:#8b949e">${escHtml(id)}</small></td>`;
    html += `<td>${skillNames}</td>`;
    html += `<td>${tags}</td>`;
    html += `<td>${hb}</td></tr>`;
    html += `<tr id="agent-details-${safeId}" class="agent-details"><td colspan="5">`;
    html += `<div class="detail-section"><h3>Description</h3><p>${escHtml(agent.description || "-")}</p></div>`;
    if (agent.url) html += `<div class="detail-section"><h3>URL</h3><p>${agent.url}</p></div>`;
    if (skills.length > 0) {
      html += `<div class="detail-section"><h3>Skills</h3>`;
      for (const sk of (agent.skills || agent.capabilities?.skills || [])) {
        html += `<div class="skill-card"><span class="name">${escHtml(sk.name)}</span> <span class="desc">${escHtml(sk.description || "")}</span></div>`;
      }
      html += `</div>`;
    }
    html += `<div class="detail-section"><h3>ID</h3><code>${escHtml(agent.id)}</code></div>`;
    html += `</td></tr>`;
  }
  html += '</tbody></table>';
  if (data.total > data.agents.length) {
    html += `<p style="color:#8b949e; margin-top: 8px;">Showing ${data.agents.length} of ${data.total} agents</p>`;
  }
  container.innerHTML = html;
}

// ── TASKS ─────────────────────────────────────────────────────────

async function fetchTasks() {
  const container = document.getElementById("task-list");
  container.innerHTML = '<div class="loading">Loading tasks...</div>';
  try {
    const q = document.getElementById("task-search").value.trim();
    const state = document.getElementById("task-state-filter").value;
    let url = `${API}/v1/tasks`;
    const params = [];
    if (q) params.push(`agent_id=${encodeURIComponent(q)}`);
    if (state) params.push(`state=${encodeURIComponent(state)}`);
    if (params.length) url += '?' + params.join('&');
    const data = await fetchData(url);
    renderTasks(data);
    updateStats();
  } catch (e) {
    container.innerHTML = `<div class="error">Failed to load tasks: ${e.message}</div>`;
  }
}

function toggleTaskDetails(id) {
  const row = document.getElementById(`task-details-${id}`);
  if (row) row.classList.toggle("open");
}

function renderTasks(data) {
  const container = document.getElementById("task-list");
  if (!data.tasks || data.tasks.length === 0) {
    container.innerHTML = '<div class="loading">No tasks yet.</div>';
    return;
  }
  let html = '<table><thead><tr><th>State</th><th>Query</th><th>Agent</th><th>Created</th><th>Updated</th></tr></thead><tbody>';
  for (const task of data.tasks) {
    const state = task.state || "unknown";
    const stateClass = `badge-${state}`;
    const created = task.created_at ? new Date(task.created_at * 1000).toLocaleString() : "-";
    const updated = task.updated_at ? new Date(task.updated_at * 1000).toLocaleString() : "-";
    const tid = task.id || "";
    const safeTid = tid.replace(/[^a-zA-Z0-9_-]/g, "_");
    const queryPreview = (task.query || "").length > 60 ? (task.query || "").substring(0, 57) + "..." : (task.query || "-");
    html += `<tr class="task-row" onclick="toggleTaskDetails('${safeTid}')">`;
    html += `<td><span class="badge ${stateClass}">${state}</span></td>`;
    html += `<td>${escHtml(queryPreview)}</td>`;
    html += `<td><code>${(task.agent_id || "").substring(0, 12)}...</code></td>`;
    html += `<td>${created}</td>`;
    html += `<td>${updated}</td></tr>`;
    html += `<tr id="task-details-${safeTid}" class="task-details"><td colspan="5">`;
    if (task.query) {
      html += `<div class="detail-section"><h3>Query</h3><div class="task-query">${escHtml(task.query)}</div></div>`;
    }
    html += `<div class="detail-section"><h3>Task ID</h3><code>${escHtml(tid)}</code></div>`;
    html += `<div class="detail-section"><h3>Agent ID</h3><code>${escHtml(task.agent_id || "")}</code></div>`;
    if (task.result && Object.keys(task.result).length > 0) {
      html += `<div class="detail-section"><h3>Result</h3>${renderTaskResult(task.result)}</div>`;
    }
    if (task.error) {
      html += `<div class="detail-section"><h3>Error</h3><pre style="color:#f85149">${escHtml(task.error)}</pre></div>`;
    }
    if (task.session_id) {
      html += `<div class="detail-section"><h3>Session ID</h3><code>${escHtml(task.session_id)}</code></div>`;
    }
    html += `</td></tr>`;
  }
  html += '</tbody></table>';
  if (data.total > data.tasks.length) {
    html += `<p style="color:#8b949e; margin-top: 8px;">Showing ${data.tasks.length} of ${data.total} tasks</p>`;
  }
  container.innerHTML = html;
}

// ── KANBAN ────────────────────────────────────────────────────────

async function fetchKanban() {
  const container = document.getElementById("kanban-board");
  container.dataset.loaded = true;
  container.innerHTML = '<div class="loading">Loading orchestration tasks...</div>';
  try {
    const q = document.getElementById("kb-search").value.trim();
    const status = document.getElementById("kb-status-filter").value;
    let url = `${API}/v2/tasks?limit=200`;
    const params = [];
    if (q) params.push(`q=${encodeURIComponent(q)}`);
    if (status) params.push(`status=${encodeURIComponent(status)}`);
    if (params.length) url += '&' + params.join('&');
    const data = await fetchData(url);
    renderKanban(data);
    updateStats();
    const assigneeSet = new Set();
    for (const t of data.tasks) { if (t.assignee) assigneeSet.add(t.assignee); }
    const sel = document.getElementById("kb-assignee-filter");
    const currentVal = sel.value;
    let opts = '<option value="">All Assignees</option>';
    for (const a of [...assigneeSet].sort()) { opts += `<option value="${escHtml(a)}">${escHtml(a)}</option>`; }
    if (sel.innerHTML !== opts) sel.innerHTML = opts;
    sel.value = currentVal;
  } catch (e) {
    container.innerHTML = `<div class="error">Failed to load orchestration tasks: ${e.message}</div>`;
  }
}

function switchKanbanView(view) {
  kanbanView = view;
  document.getElementById("view-board").style.background = view === "board" ? "#1f6feb33" : "";
  document.getElementById("view-board").style.borderColor = view === "board" ? "#1f6feb55" : "";
  document.getElementById("view-list").style.background = view === "list" ? "#1f6feb33" : "";
  document.getElementById("view-list").style.borderColor = view === "list" ? "#1f6feb55" : "";
  const lastData = window._lastKanbanData;
  if (lastData) renderKanban(lastData);
}

function renderKanban(data) {
  window._lastKanbanData = data;
  const container = document.getElementById("kanban-board");
  if (!data.tasks || data.tasks.length === 0) {
    container.innerHTML = '<div class="loading">No orchestration tasks yet.<br><small style="color:#484f58">Create tasks via POST /v2/tasks to see them here.</small></div>';
    return;
  }
  const assigneeFilter = document.getElementById("kb-assignee-filter").value;
  let tasks = data.tasks;
  if (assigneeFilter) {
    tasks = tasks.filter(t => t.assignee === assigneeFilter);
  }
  if (kanbanView === "list") {
    renderKanbanList(container, tasks);
  } else {
    renderKanbanBoard(container, tasks);
  }
}

function renderKanbanBoard(container, tasks) {
  const groups = {};
  for (const s of STATUS_COLUMNS) groups[s] = [];
  for (const t of tasks) {
    const s = t.status || "todo";
    if (groups[s]) groups[s].push(t);
    else groups[s] = [t];
  }
  let html = '<div class="kb-board">';
  for (const col of STATUS_COLUMNS) {
    const items = groups[col] || [];
    html += `<div class="kb-column kb-col-${col}">`;
    html += `<div class="kb-col-header">${STATUS_LABELS[col] || col} <span class="count">${items.length}</span></div>`;
    html += `<div class="kb-col-body">`;
    if (items.length === 0) {
      html += `<div style="color:#484f58;font-size:12px;text-align:center;padding:12px;">—</div>`;
    } else {
      for (const t of items) {
        const assignee = t.assignee ? `<span>👤 ${escHtml(t.assignee)}</span>` : '';
        const priority = t.priority > 0 ? `<span>⚡${t.priority}</span>` : '';
        html += `<div class="kb-card" onclick="showTaskDetail('${t.id}')">`;
        html += `<div class="kb-card-title">${escHtml(t.title || "Untitled")}</div>`;
        html += `<div class="kb-card-meta">${assignee}${priority}<span>#${escHtml(t.id)}</span></div>`;
        html += `</div>`;
      }
    }
    html += `</div></div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderKanbanList(container, tasks) {
  let html = '<table><thead><tr><th>Status</th><th>Title</th><th>Assignee</th><th>Priority</th><th>Created</th></tr></thead><tbody>';
  for (const t of tasks) {
    html += `<tr class="kb-row" onclick="showTaskDetail('${t.id}')">`;
    html += `<td><span class="badge badge-${t.status}">${t.status}</span></td>`;
    html += `<td>${escHtml(t.title || "Untitled")}</td>`;
    html += `<td>${escHtml(t.assignee || "-")}</td>`;
    html += `<td>${t.priority || 0}</td>`;
    html += `<td>${t.created_at ? new Date(t.created_at*1000).toLocaleString() : "-"}</td></tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

let _taskDetailData = {};

function applyTaskDetailTab(name) {

async function showTaskDetail(taskId) {
  try {
    const data = await fetchData(`${API}/v2/tasks/${taskId}`);
    _taskDetailData = data;
    const t = data.task;
    let html = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="event.target===this&&closeTaskDetail()">';
    html += `<div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:28px;width:700px;max-width:95vw;max-height:85vh;overflow-y:auto;">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">`;
    html += `<h2 style="font-size:18px;font-weight:600;color:#f0f6fc;">${escHtml(t.title)}</h2>`;
    html += `<span class="badge badge-${t.status}" style="font-size:13px;padding:4px 12px;">${t.status}</span>`;

    html += `<div style="display:flex;gap:16px;margin-bottom:16px;font-size:13px;color:#8b949e;">`;
    html += `<span>ID: <code>${escHtml(t.id)}</code></span>`;
    if (t.assignee) html += `<span>Assignee: <code>${escHtml(t.assignee)}</code></span>`;
    if (t.tenant) html += `<span>Tenant: <code>${escHtml(t.tenant)}</code></span>`;
    html += `</div>`;

    // Tabs
    html += `<div id="modal-detail-tabs" class="detail-tabs">`;
    html += `<button class="active" onclick="detailTab('runs')">Runs (${(data.runs||[]).length})</button>`;
    html += `<button onclick="detailTab('events')">Events (${(data.events||[]).length})</button>`;
    html += `<button onclick="detailTab('comments')">Comments (${(data.comments||[]).length})</button>`;
    html += `<button onclick="detailTab('deps')">Dependencies</button>`;
    if (t.body) html += `<button onclick="detailTab('body')">Body</button>`;
    html += `</div>`;

    // Runs pane
    html += `<div id="dp-runs" class="detail-pane active">`;
    if (!data.runs || data.runs.length === 0) {
      html += `<div style="color:#484f58;font-size:13px;padding:16px;text-align:center;">No runs yet.</div>`;
    } else {
      for (const r of data.runs) {
        html += `<div class="run-item">`;
        html += `<span class="run-status badge badge-${r.status}">${r.status}</span> `;
        html += `<span class="run-outcome">${r.outcome || ""}</span> — `;
        html += `<span>${r.started_at ? new Date(r.started_at*1000).toLocaleString() : "?"}`;
        if (r.ended_at) html += ` → ${new Date(r.ended_at*1000).toLocaleString()}`;
        html += `</span>`;
        if (r.summary) html += `<div style="margin-top:4px;font-size:12px;color:#c9d1d9;">${escHtml(r.summary)}</div>`;
        if (r.error) html += `<div style="margin-top:4px;font-size:12px;color:#f85149;">${escHtml(r.error)}</div>`;
        html += `</div>`;
      }
    }
    html += `</div>`;

    // Events pane
    html += `<div id="dp-events" class="detail-pane">`;
    if (!data.events || data.events.length === 0) {
      html += `<div style="color:#484f58;font-size:13px;padding:16px;text-align:center;">No events logged.</div>`;
    } else {
      for (const e of data.events) {
        const date = e.created_at ? new Date(e.created_at*1000).toLocaleString() : "";
        html += `<div class="event-item"><span class="kind">${e.kind}</span> <span style="color:#484f58">${date}</span></div>`;
      }
    }
    html += `</div>`;

    // Comments pane
    html += `<div id="dp-comments" class="detail-pane">`;
    if (!data.comments || data.comments.length === 0) {
      html += `<div style="color:#484f58;font-size:13px;padding:16px;text-align:center;">No comments yet.</div>`;
    } else {
      for (const c of data.comments) {
        html += `<div class="comment-bubble"><span class="author">${escHtml(c.author)}</span><span class="time">${c.created_at ? new Date(c.created_at*1000).toLocaleString() : ""}</span><div class="body">${escHtml(c.body)}</div></div>`;
      }
    }
    html += `</div>`;

    // Dependencies pane
    html += `<div id="dp-deps" class="detail-pane">`;
    const parents = data.parents || [];
    const children = data.children || [];
    if (parents.length === 0 && children.length === 0) {
      html += `<div style="color:#484f58;font-size:13px;padding:16px;text-align:center;">No dependencies.</div>`;
    } else {
      if (parents.length > 0) {
        html += `<div class="detail-section"><h3>Depends on (parents)</h3>`;
        for (const p of parents) html += `<div class="dep-node"><span class="badge badge-${p.status}" style="font-size:10px;margin-right:6px;">${p.status}</span>${escHtml(p.title)} <code style="font-size:11px;">${escHtml(p.id)}</code></div> `;
        html += `</div>`;
      }
      if (children.length > 0) {
        html += `<div class="detail-section" style="margin-top:12px;"><h3>Blocks (children)</h3>`;
        for (const c of children) html += `<div class="dep-node"><span class="badge badge-${c.status}" style="font-size:10px;margin-right:6px;">${c.status}</span>${escHtml(c.title)} <code style="font-size:11px;">${escHtml(c.id)}</code></div> `;

    html += `</div></div>`;
    const div = document.createElement("div");
    div.id = "task-detail-modal";
    div.innerHTML = html;
    document.body.appendChild(div);
    window._taskDetailTab = function(name) {
      document.querySelectorAll('#modal-detail-tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.detail-pane').forEach(p => p.classList.remove('active'));
      document.getElementById(`dp-${name}`).classList.add('active');
    };
  } catch (e) {
    alert("Failed to load task details: " + e.message);
  }

  if (el) el.remove();
}

async function submitCreateTask() {
  const title = document.getElementById("ct-title").value.trim();
  if (!title) { document.getElementById("ct-status").textContent = "Title is required."; return; }
  const body = document.getElementById("ct-body").value.trim();
  const assignee = document.getElementById("ct-assignee").value.trim();
  const parentsRaw = document.getElementById("ct-parents").value.trim();
  const parents = parentsRaw ? parentsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];
  const payload = { title };
  if (body) payload.body = body;
  if (assignee) payload.assignee = assignee;
  if (parents.length > 0) payload.parents = parents;
  try {
    document.getElementById("ct-status").textContent = "Creating...";
    const resp = await fetch(`${API}/v2/tasks`, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...authHeaders() },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || resp.statusText); }
    const data = await resp.json();
    document.getElementById("ct-status").innerHTML = `✅ Created <code>${data.task.id}</code>`;
    setTimeout(closeCreateTaskModal, 800);
    setTimeout(fetchKanban, 1000);
  } catch (e) {
    document.getElementById("ct-status").textContent = "Error: " + e.message;
  }
}

// ── ADMIN ─────────────────────────────────────────────────────────

async function fetchAdminClients() {
  const container = document.getElementById("admin-clients");
  container.innerHTML = '<div class="loading">Loading OAuth clients...</div>';
  try {
    const q = document.getElementById("admin-search").value.trim();
    let url = `${API}/admin/clients`;
    if (q) url += `?q=${encodeURIComponent(q)}`;
    const data = await fetchData(url);
    renderAdminClients(data);
  } catch (e) {
    container.innerHTML = `<div class="error">Failed to load clients: ${e.message}</div>`;
  }
}

function renderAdminClients(data) {
  const container = document.getElementById("admin-clients");
  const clients = Array.isArray(data) ? data : (data.clients || []);
  if (clients.length === 0) {
    container.innerHTML = '<div class="loading">No OAuth clients registered.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Client ID</th><th>Description</th><th>Scopes</th><th>Created</th><th>Action</th></tr></thead><tbody>';
  for (const c of clients) {
    html += '<tr>';
    html += `<td><code>${escHtml(c.client_id)}</code></td>`;
    html += `<td>${escHtml(c.description || "-")}</td>`;
    html += `<td>${(c.scopes||[]).map(s => `<span class="tag">${s}</span>`).join("")}</td>`;
    html += `<td>${c.created_at ? new Date(c.created_at*1000).toLocaleString() : "-"}</td>`;
    html += `<td><button onclick="confirmDeleteClient('${c.client_id}')" style="background:transparent;border:1px solid #f85149;color:#f85149;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;">Delete</button></td>`;
    html += '</tr>';
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function confirmDeleteClient(clientId) {
  if (!confirm(`Delete OAuth client ${clientId}? This will revoke all its tokens.`)) return;
  fetch(`${API}/admin/clients/${clientId}`, {
    method: "DELETE",
    headers: { ...authHeaders() }
  }).then(r => { if (r.ok) fetchAdminClients(); else alert("Delete failed"); });
}

async function createAdminClient() {
  const agentCardId = document.getElementById("ac-agent-card-id").value.trim();
  const description = document.getElementById("ac-description").value.trim();
  const scopeEls = document.querySelectorAll(".ac-scope:checked");
  const allowedScopes = Array.from(scopeEls).map(el => el.value);
  const payload = {};
  if (description) payload.description = description;
  if (allowedScopes.length > 0) payload.allowed_scopes = allowedScopes;
  if (agentCardId) payload.agent_card_id = agentCardId;
  try {
    document.getElementById("ac-status").textContent = "Creating...";
    const resp = await fetch(`${API}/admin/clients`, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...authHeaders() },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || resp.statusText); }
    const data = await resp.json();
    const secret = data.client_secret || "(no secret returned)";
    document.getElementById("ac-status").innerHTML = `✅ Created <code>${data.client_id}</code><br><small style="color:#d29922;">Secret: ${secret} (save it now — won't be shown again)</small>`;
    fetchAdminClients();
  } catch (e) {
    document.getElementById("ac-status").textContent = "Error: " + e.message;
  }
}

// ── Helpers ───────────────────────────────────────────────────────

function escHtml(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML.replace(/"/g, "&quot;");
}

function renderTaskResult(result) {
  if (typeof result === "string") return `<pre>${escHtml(result)}</pre>`;
  return `<pre>${escHtml(JSON.stringify(result, null, 2))}</pre>`;
}

// Auto-refresh every 15s
setInterval(() => {
  if (isAuthenticated()) {
    updateStats();
    const tab = document.querySelector('.tabs .active');
    if (tab) {
      const name = tab.id.replace('tab-', '');
      if (name === 'agents') fetchAgents();
    }
  }
}, 15000);
</script>
