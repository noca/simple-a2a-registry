<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2A Registry — 登录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-container {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: #8b949e;
    text-align: center;
    margin-bottom: 28px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #8b949e;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #c9d1d9;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #58a6ff;
  }
  .btn {
    width: 100%;
    padding: 10px 20px;
    background: #238636;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error-msg {
    background: #3d1417;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f85149;
    margin-bottom: 18px;
    display: none;
  }
  .success-msg {
    background: #132e1a;
    border: 1px solid #3fb950;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #3fb950;
    margin-bottom: 18px;
    display: none;
    text-align: center;
  }
  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: #484f58;
  }
  .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .version {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: #484f58;
  }
</style>
</head>
<body>
<div class="login-container">
  <h1>A2A Registry</h1>
  <p class="subtitle">请输入用户名和密码登录管理后台</p>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg">
    ✅ 登录成功，正在跳转…
  </div>

  <form id="loginForm" autocomplete="on">
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="loginBtn">
      <span id="btnText">登 录</span>
      <div class="spinner" id="btnSpinner"></div>
    </button>
  </form>

  <div class="footer">
    Simple A2A Registry &mdash; Dashboard Login
  </div>
</div>
<div class="version">v1.0.0</div>

<script>
(function() {
  const form = document.getElementById('loginForm');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const btnText = document.getElementById('btnText');
  const btnSpinner = document.getElementById('btnSpinner');
  const loginBtn = document.getElementById('loginBtn');

  // If already logged in, redirect
  fetch('/api/me', { credentials: 'same-origin' })
    .then(r => { if (r.ok) window.location.href = '/'; })
    .catch(() => {});

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    const u = username.value.trim();
    const p = password.value;
    if (!u || !p) {
      showError('请输入用户名和密码');
      return;
    }

    // Loading state
    btnText.style.display = 'none';
    btnSpinner.style.display = 'block';
    loginBtn.disabled = true;

    try {
      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p }),
        credentials: 'same-origin',
      });

      const data = await resp.json();

      if (resp.ok) {
        successMsg.style.display = 'block';
        setTimeout(() => { window.location.href = '/'; }, 500);
      } else {
        showError(data.detail || '用户名或密码错误');
      }
    } catch (err) {
      showError('网络错误，请检查连接');
    } finally {
      btnText.style.display = 'inline';
      btnSpinner.style.display = 'none';
      loginBtn.disabled = false;
    }
  });

  function showError(msg) {
    errorMsg.textContent = '❌ ' + msg;
    errorMsg.style.display = 'block';
  }
})();
</script>
</body>
</html>
